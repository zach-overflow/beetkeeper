site_name: beetkeeper
site_url: https://beetkeeper.dadbodaudio.com/
site_description: Self-hosted web app for managing and monitoring your beets music library.
site_author: Zach Gottesman
copyright: Copyright &copy; 2026 Zach Gottesman — AGPL-3.0-or-later

repo_name: zach-overflow/beetkeeper
repo_url: https://github.com/zach-overflow/beetkeeper
edit_uri: edit/main/docs/

docs_dir: docs

# Keep non-doc files that live under docs/ out of the published site (e.g. the Pants BUILD file that defines
# the docs build targets). gitignore-style patterns, relative to docs_dir.
# https://www.mkdocs.org/user-guide/configuration/#exclude_docs
exclude_docs: |
  BUILD
  BUILD.*
  *.py[cod]
  overrides/

theme:
  name: material
  color_mode: false
  user_color_mode_toggle: false
  logo: assets/images/logo/logo-crt-green.svg
  favicon: assets/images/logo/favicon-16.png
  icon:
    repo: fontawesome/brands/github
  # Stock Material light/dark toggle, but with `custom` primary/accent: the CRT green (primary) + neon purple
  # (accent), plus the Courier headings/TOC and scanlines, are defined in extra_css (docs/assets/css/…).
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: slate
      primary: custom
      accent: custom
      # toggle:
      #   icon: material/weather-night
      #   name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      # toggle:
      #   icon: material/weather-sunny
      #   name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

# Stock Material with a few CRT callbacks to the web UI: Courier font, heading glow, and scanlines on the
# header + admonition titles (see docs/assets/css/beetkeeper.css). Remove this line for pure stock Material.
extra_css:
  - assets/css/beetkeeper.css

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # griffe uses STATIC analysis over these source roots (no import of beetkeeper needed), so the
          # docs build only needs the mkdocs tools — not the app or its runtime deps. See docs/BUILD.
          paths:
            - src/python
            - src/beetsplug
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 2
            filters:
              - "!^_"
  # Renders the app's OpenAPI spec (docs/openapi.json, generated by `pants run docs:openapi`) inline on the
  # REST API page via the `[OAD(...)]` directive. https://www.neoteroi.dev/mkdocs-plugins/web/
  - neoteroi.mkdocsoad:
      use_pymdownx: true
      # Override just the example partial to drop essentials-openapi's per-example "auto-generated / not
      # accurate" disclaimer (a single note about schema-generated examples lives on the reference page
      # instead). ChoiceLoader tries this dir before the package's built-in templates. Excluded from the
      # published site via `exclude_docs: overrides/`.
      templates_path: docs/overrides/oad

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage:
      - Quick Start Demo: usage/quickstart.md
      - Using the Web Interface: usage/web-interface.md
      - Using the REST API: usage/rest-api.md
      - Using the CLI: usage/cli.md
      - Deployment: usage/deployment.md
  - API Reference:
      - Configuration schema: reference/configuration.md
      - Plugin API: reference/plugin.md
      - REST API Reference: reference/rest-api.md
  - Contributing:
      - Overview: contributor_docs/index.md
      - Testing & development: contributor_docs/testing_and_development.md
      - Release management: contributor_docs/release_management.md
