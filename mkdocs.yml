site_name: beetkeeper
site_url: https://beetkeeper.dadbodaudio.com/
site_description: Self-hosted web app for managing and monitoring your beets music library.
site_author: Zach Gottesman
copyright: Copyright &copy; 2026 Zach Gottesman — AGPL-3.0-or-later

repo_name: zach-overflow/beetkeeper
repo_url: https://github.com/zach-overflow/beetkeeper
edit_uri: edit/main/docs/

docs_dir: docs

# Keep non-doc files (e.g. the Pants BUILD file) out of the published site.
# https://www.mkdocs.org/user-guide/configuration/#exclude_docs
exclude_docs: |
  BUILD
  BUILD.*
  *.py[cod]

theme:
  name: material
  color_mode: false
  user_color_mode_toggle: false
  logo: assets/images/logo/logo-crt-green.svg
  favicon: assets/images/logo/favicon-16.png
  icon:
    repo: fontawesome/brands/github
  # `custom` primary/accent: the actual CRT colors are defined in extra_css (docs/assets/css/…).
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: slate
      primary: custom
      accent: custom
      # toggle:
      #   icon: material/weather-night
      #   name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      # toggle:
      #   icon: material/weather-sunny
      #   name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

extra_css:
  - assets/css/beetkeeper.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage:
      - Quick Start Demo: usage/quickstart.md
      - Using the Web Interface: usage/web-interface.md
      - Using the REST API: usage/rest-api.md
      - Using the CLI: usage/cli.md
      - Deployment: usage/deployment.md
  - Contributing:
      - Overview: contributor_docs/index.md
      - Testing & development: contributor_docs/testing_and_development.md
      - Release management: contributor_docs/release_management.md
