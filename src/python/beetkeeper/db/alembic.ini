# Alembic config for manual/dev use (e.g. authoring migrations with `alembic revision --autogenerate`).
#
# At application runtime the `beetkeeper db ...` CLI does NOT read this file — it builds the alembic
# Config programmatically (see `beetkeeper.db.migrations`). This file exists so a developer can run the
# `alembic` CLI directly from the repo, e.g.:
#
#   alembic -c src/python/beetkeeper/db/alembic.ini -x db_url=sqlite+aiosqlite:///./beetkeeper.db revision \
#       --autogenerate -m "describe change"
#
# The connection URL is resolved by env.py (see its docstring): prefer `-x db_url=...` or `BEETKEEPER_CONFIG`.
[alembic]
script_location = %(here)s/alembic
version_locations = %(here)s/alembic/versions
prepend_sys_path = .
path_separator = os

# Placeholder only — overridden by `-x db_url=...`, `BEETKEEPER_CONFIG`, or the programmatic Config.
sqlalchemy.url = sqlite:///beetkeeper.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
