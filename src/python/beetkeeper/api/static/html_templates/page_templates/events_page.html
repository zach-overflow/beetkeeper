{% extends "base_template.html" %}
{% block content %}
<h1>Beets Events</h1>
<p>Recently ingested beets events, as reported by the beetkeeper event-listener plugin.</p>

<!-- Load the recent-events fragment on page load, then refresh it periodically so new events appear. -->
<div id="recent-events"
     hx-get="{{ url_for('recent_events_fragment') }}"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
	<p aria-busy="true">Loading recent events…</p>
</div>
{% endblock %}
