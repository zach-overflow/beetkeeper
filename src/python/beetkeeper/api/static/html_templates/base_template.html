<html lang="en">
<!-- This template should be extended from by any HTMLResponse templates. -->
<head>
	<meta charset="UTF-8">
	<!-- Any required javascript not covered by `htmx.min.js` should be written as <script> segments here.
	     Asset URLs use `url_for('static', ...)`, which resolves from the app's static mount, so every
	     template render must pass `request` into the TemplateResponse context (or `url_for` raises). -->
	<script src="{{ url_for('static', path='/js/htmx.min.js') }}"></script>
	<link rel="stylesheet" href="{{ url_for('static', path='/css/classless.css') }}">
	 <!-- Light mode choice: Displays when theme background is light (uses dark icon) -->
    <!-- <link rel="icon" href="{{ url_for('static', path='/img/favicon-dark.ico') }}" media="(prefers-color-scheme: light)"> -->
    <!-- Dark mode choice: Displays when theme background is dark (uses light icon) -->
    <link rel="icon" href="{{ url_for('static', path='/img/crt-purple-favicon.ico') }}" type="image/x-icon">
	<!-- Preload the hover-state logo so the first hover swaps without a flash (see `.logo-main` in classless.css). -->
	<link rel="preload" href="{{ url_for('static', path='/img/logo-CRT-green.svg') }}" as="image" type="image/svg+xml">
	 
	<!-- No base-target override here, so links open in the current tab (the browser default). -->
</head>
<body>
	<!-- Shared nav bar, rendered on every page via this base template (no need to repeat it per page). -->
	<div id="nav-links">
		<div class="logo-main">
			<a href="https://beetkeeper.dadbodaudio.com/" target="_blank"><img src="{{ url_for('static', path='/img/logo-CRT-purple.svg') }}" alt="beetkeeper logo"></a>
		</div>
		<!-- <a href="/home" role="button">Main Page</a> -->
		<a href="/events" role="button">Beets Events</a>
		<a href="/import" role="button">Import</a>
		<a href="/search" role="button">Search</a>
		{% if request.cookies.get(session_cookie_name) %}
		<form method="post" action="/logout">
			<button type="submit">Log out</button>
		</form>
		{% endif %}
		<div class="version-info-box">
			<a href="">version: {{ current_app_version }}</a>
			{% if latest_available_app_version != current_app_version %}
			<br>
			<svg aria-hidden="true" data-component="Octicon" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true" class="octicon octicon-tag flex-shrink-0 mt-1 tmp-mt-1 color-fg-success">
    			<path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 0 1 0 2.474l-5.026 5.026a1.75 1.75 0 0 1-2.474 0l-6.25-6.25A1.752 1.752 0 0 1 1 7.775Zm1.5 0c0 .066.026.13.073.177l6.25 6.25a.25.25 0 0 0 .354 0l5.025-5.025a.25.25 0 0 0 0-.354l-6.25-6.25a.25.25 0 0 0-.177-.073H2.75a.25.25 0 0 0-.25.25ZM6 5a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"></path>
			</svg>
			<a href="https://github.com/zach-overflow/beetkeeper/releases/tag/v{{ latest_available_app_version }}">new version available: {{ latest_available_app_version }}</a>
			{% endif %}
		</div>
	</div>
	{% block content %}{% endblock %}

	<!-- Persist the open/closed state of `<details data-persist-key="...">` accordions across HTMX swaps.
	     The import-job fragment re-renders on each poll, which would otherwise snap an opened accordion
	     (e.g. "Import output") shut. State is kept in memory, keyed by `data-persist-key`. -->
	<script>
		(function () {
			var openState = {};
			// The `toggle` event does not bubble, so delegate via the capture phase to catch it on any <details>.
			document.addEventListener("toggle", function (event) {
				var el = event.target;
				if (el.tagName === "DETAILS" && el.dataset.persistKey) {
					openState[el.dataset.persistKey] = el.open;
				}
			}, true);
			function restoreDetailsState() {
				document.querySelectorAll("details[data-persist-key]").forEach(function (el) {
					var key = el.dataset.persistKey;
					if (key in openState) {
						el.open = openState[key];
					}
				});
			}
			// HTMX swaps replace fragment DOM; re-apply the remembered state to any restored accordions.
			document.body.addEventListener("htmx:afterSwap", restoreDetailsState);
			restoreDetailsState();
		})();
	</script>
</body>
</html>
