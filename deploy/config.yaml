---
# Beets config for running beetkeeper in Docker (a contributor smoke-test setup; see deploy/README.md).
# Every path is a CONTAINER path. beetkeeper reads its own settings from the OPTIONAL top-level `beetkeeper`
# section; the rest is an ordinary beets config: https://beets.readthedocs.io/en/stable/reference/config.html
directory: /data/music
library: /data/library.db

beetkeeper:
  log_level: INFO
  server:
    # 0.0.0.0 (not localhost) so the server is reachable from the host via the published port.
    hostname: 0.0.0.0
    port: 8337
  database:
    # On the mounted /data volume so the DB survives container restarts.
    sqlite_path: /data/beetkeeper.db
