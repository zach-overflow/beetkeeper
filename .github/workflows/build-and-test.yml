name: Build
run-name: Build ${{ github.ref }} by ${{ github.actor }}
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'

# Layer CI-only overrides on top of pants.toml for every Pants invocation below (see pants.ci.toml).
env:
  PANTS_CONFIG_FILES: pants.ci.toml

# Validation runs natively via Pants (not a throwaway test image); see
# https://www.pantsbuild.org/stable/docs/using-pants/using-pants-in-ci
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so Pants can diff against base branches (e.g. for `--changed-since`).
          fetch-depth: 0

      - name: Lint GitHub Actions workflows
        # No Pants backend for actionlint, so the shared hook runs it directly (downloads a pinned binary).
        run: |
          bash hooks/actionlint.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        # Pants lint/test goals shell out to `uv run`, so uv must be on PATH. Pinned to match uv.lock.
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          # Bump to invalidate every Pants cache; re-fetch named caches when dependencies change.
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'
      
      - name: Check BUILD files are up to date
        run: |
          pants update-build-files --check ::

      - name: Static checks and tests
        run: |
          pants lint check test ::

      - name: Build artifacts (no push)
        run: |
          pants package ::

      - name: Build docs site
        run: |
          pants run docs:mkdocs-pex -- build --strict

      - name: Upload Pants log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pants-log
          path: .pants.d/workdir/pants.log
