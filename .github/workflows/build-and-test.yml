name: Build
run-name: Build ${{ github.ref }} by ${{ github.actor }}
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'

# Layer CI-only overrides on top of pants.toml for every Pants invocation below (see pants.ci.toml).
env:
  PANTS_CONFIG_FILES: pants.ci.toml

# Validation runs natively via Pants (not a throwaway test image); see
# https://www.pantsbuild.org/stable/docs/using-pants/using-pants-in-ci
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so Pants can diff against base branches (e.g. for `--changed-since`).
          fetch-depth: 0

      - name: Lint GitHub Actions workflows
        # No Pants backend for actionlint, so the shared hook runs it directly (downloads a pinned binary).
        run: |
          bash hooks/actionlint.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        # Pants lint/test goals shell out to `uv run`, so uv must be on PATH. Pinned to match uv.lock.
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          # Bump to invalidate every Pants cache; re-fetch named caches when dependencies change.
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'
      
      - name: Check BUILD files are up to date
        run: |
          pants update-build-files --check ::

      - name: Static checks and tests
        run: |
          pants lint check test ::

      # Non-docker artifacts (wheels + all PEXes) build here; the image is validated per-arch in `build-image`
      # below. The image build needs a native runner per arch, so it can't be exercised in this single job.
      - name: Build non-docker artifacts
        run: |
          pants package --filter-target-type=-docker_image ::

      - name: Build docs site
        run: |
          pants run docs:mkdocs-pex -- build --strict

      - name: Upload Pants log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pants-log
          path: .pants.d/workdir/pants.log

  # Validate the image on both arches natively (no push): each runner builds for its own arch, so the
  # arm64 TARGETARCH COPY + running the arm64 PEX in-container are exercised here, not first at release.
  build-image:
    name: Build image (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: image-${{ matrix.arch }}-v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'
      - name: Build image (native ${{ matrix.arch }}, no push)
        run: |
          pants package //:beetkeeper-server-image
