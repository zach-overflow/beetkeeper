name: Docs
run-name: Docs ${{ github.ref }} by ${{ github.actor }}

# Build the MkDocs site with Pants (mkdocs + Material from `tools-resolve`) and publish it to
# GitHub Pages via the official Pages actions. Pages must be configured with source = "GitHub Actions"
# (Settings -> Pages). Publishes on push to `main` for doc-affecting paths, or on demand via "Run workflow".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "3rdparty/tools/**"
      - "pants.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token: read the repo, write the Pages deployment, mint the OIDC token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-progress run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site (Pants -> mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so mkdocs-material's git-based features and Pants diffing behave.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Set up uv
        # The `[python] resolver = "uv"` resolve is built with uv, so Pants needs it on PATH.
        uses: astral-sh/setup-uv@v5
      - name: Init Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: docs-v0
          named-caches-hash: ${{ hashFiles('3rdparty/tools/tools-lockfile.json') }}
      - name: Build the docs site
        # `pants run` executes the mkdocs pex_binary in the workspace -> ./site. `--strict` fails on warnings.
        run: pants run docs:mkdocs-pex -- build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
