name: Release
run-name: Release validation for draft by ${{ github.actor }}

# One-click release flow:
#   1. Fill out the GitHub "new release" form: title = `MAJOR.MINOR.PATCH`, the release notes, and SAVE AS
#      DRAFT (a draft creates no tag and fires no workflow events).
#   2. Run this workflow (Actions -> Release -> Run workflow, from the default branch). It locates the
#      draft, validates the repo, and builds every artifact WITHOUT publishing anything.
#   3. Approve the `release` environment prompt. The workflow then tags the validated commit `vX.Y.Z`,
#      flips the draft release to published, and dispatches the Publish workflow (see the `publish` job
#      below for why it is dispatched rather than `push`-triggered or called as a reusable workflow).
on:
  workflow_dispatch:

permissions:
  contents: read

# Never validate/tag two releases concurrently.
concurrency:
  group: release
  cancel-in-progress: false

# Layer CI-only overrides on top of pants.toml for every Pants invocation below (see pants.ci.toml).
env:
  PANTS_CONFIG_FILES: pants.ci.toml

jobs:
  prepare:
    name: Locate draft release
    runs-on: ubuntu-latest
    permissions:
      # The list-releases endpoint silently omits DRAFT releases unless the token has push access
      # ("only users with push access will receive listings for draft releases"), which for the built-in
      # GITHUB_TOKEN means `contents: write` — read-only tokens see 0 drafts. This job only reads.
      contents: write
    outputs:
      version: ${{ steps.draft.outputs.version }}
      release_id: ${{ steps.draft.outputs.release_id }}
    steps:
      - name: Find the draft release and validate its title
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "::error::Releases must be run from '${DEFAULT_BRANCH}' (got '${GITHUB_REF_NAME}')."
            exit 1
          fi
          drafts="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --jq '[.[] | select(.draft)]')"
          count="$(jq length <<<"${drafts}")"
          if [[ "${count}" -ne 1 ]]; then
            echo "::error::Expected exactly one draft release, found ${count}. Create one via the GitHub \
          release form (title MAJOR.MINOR.PATCH, 'Save draft')."
            exit 1
          fi
          version="$(jq -r '.[0].name' <<<"${drafts}")"
          release_id="$(jq -r '.[0].id' <<<"${drafts}")"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Draft release title '${version}' is not of the form MAJOR.MINOR.PATCH."
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v${version}" >/dev/null 2>&1; then
            echo "::error::Tag v${version} already exists; bump the draft's title."
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
          echo "::notice::Validating ${GITHUB_SHA} for release v${version} (draft id ${release_id})."

  validate:
    name: Pants validate + build wheels
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so Pants can diff against base branches (e.g. for `--changed-since`).
          fetch-depth: 0

      - name: Lint GitHub Actions workflows
        # No Pants backend for actionlint, so the shared hook runs it directly (downloads a pinned binary).
        run: |
          bash hooks/actionlint.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        # Pants lint/test goals shell out to `uv run`, so uv must be on PATH. Pinned to match uv.lock.
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          # Bump to invalidate every Pants cache; re-fetch named caches when dependencies change.
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'

      - name: Check BUILD files are up to date
        run: |
          pants update-build-files --check ::

      - name: Static checks and tests
        run: |
          pants lint check test ::

      # Validation-only build (the Publish workflow rebuilds from the tag): proves both wheels build with
      # their `vcs_version`-derived versions. The tag doesn't exist yet, so these carry a dev version.
      - name: Build wheels
        run: |
          pants package src/python:beetkeeper-whl src/beetsplug:plugin-whl

      - name: Upload Pants log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pants-log
          path: .pants.d/workdir/pants.log

  # Validation-only image builds on native per-arch runners (no QEMU, nothing pushed).
  build-image:
    name: Validate image build (${{ matrix.arch }})
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: image-${{ matrix.arch }}-v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'
      - name: Build image (native ${{ matrix.arch }})
        run: |
          pants package //:beetkeeper-server-image

  docs-build:
    name: Validate docs build
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: docs-v0
          named-caches-hash: ${{ hashFiles('3rdparty/tools/tools-lockfile.json') }}
      - name: Build docs site
        run: pants run docs:mkdocs-pex -- build --strict

  # The single manual gate: approving the `release` environment tags the validated commit and publishes
  # the draft release in one API call (publishing a draft whose tag doesn't exist yet creates the tag at
  # `target_commitish`). Configure required reviewers on the `release` environment in repo settings.
  approve-and-tag:
    name: Approve, tag, and publish release
    needs: [prepare, validate, build-image, docs-build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Tag ${{ github.sha }} as v${{ needs.prepare.outputs.version }} and publish the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: |
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="${GITHUB_SHA}" \
            -F draft=false
          echo "::notice::Tagged ${GITHUB_SHA} as v${VERSION} and published the GitHub release."

  # Dispatch (not `workflow_call`) so Publish runs as its own top-level workflow: PyPI trusted publishing
  # rejects reusable workflows, and its registered publisher is pinned to `publish.yml`. `workflow_dispatch`
  # is exempt from GitHub's "GITHUB_TOKEN events don't create workflow runs" recursion guard (a `push` of
  # the tag with GITHUB_TOKEN is not, which is why the tag itself can't trigger Publish here).
  publish:
    name: Dispatch publish workflow
    needs: [prepare, approve-and-tag]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger publish.yml for v${{ needs.prepare.outputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh workflow run publish.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "v${VERSION}" \
            -f version="${VERSION}"
