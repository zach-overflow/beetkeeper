name: Release
run-name: Release ${{ github.ref_name }} by ${{ github.actor }}
on:
  push:
    tags:
      - 'v*'

# Per-job least privilege (see each job's `permissions`): the build/GHCR job needs `packages: write`
# (push the image with the built-in GITHUB_TOKEN); the PyPI job needs `id-token: write` for OIDC
# trusted publishing. No long-lived PyPI secret is used.
permissions:
  contents: read

# Never let two releases of the same tag publish concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Layer CI-only overrides on top of pants.toml for every Pants invocation below (see pants.ci.toml).
env:
  PANTS_CONFIG_FILES: pants.ci.toml

# Every `v*` tag builds + validates, but only an exact `vMAJOR.MINOR.PATCH` tag publishes (pre-releases like
# `v0.0.1-dev` build but are not pushed). Version is owned by the committed source. Wheels publish from a
# separate `publish-pypi` job so PyPI OIDC trusted publishing is scoped to the `pypi` environment.
jobs:
  release:
    name: Pants build, validate, stage wheels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      is_release: ${{ steps.gate.outputs.is_release }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so Pants can diff against base branches (e.g. for `--changed-since`).
          fetch-depth: 0

      - name: Lint GitHub Actions workflows
        # No Pants backend for actionlint, so the shared hook runs it directly (downloads a pinned binary).
        run: |
          bash hooks/actionlint.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        # Pants lint/test goals shell out to `uv run`, so uv must be on PATH. Pinned to match uv.lock.
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          # Bump to invalidate every Pants cache; re-fetch named caches when dependencies change.
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'

      - name: Check BUILD files are up to date
        run: |
          pants update-build-files --check ::

      - name: Static checks and tests
        run: |
          pants lint check test ::

      - name: Version tag gate
        id: gate
        # GitHub `if:` expressions have no regex, so compute the "is this an exact vMAJOR.MINOR.PATCH tag?"
        # decision here and expose it as an output; pre-release tags build + validate but skip publishing.
        run: |
          ref="${GITHUB_REF_NAME}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          if [[ "${ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${ref} is a release tag - artifacts will be published to GHCR + PyPI."
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${ref} is not a vMAJOR.MINOR.PATCH tag - build + validate only, no publish."
          fi

      - name: Validate release versions
        # Drift guard (opt-in via `-m release_tests`): asserts the committed versions agree with each other
        # and, for a `vMAJOR.MINOR.PATCH` tag, with the pushed tag, so a forgotten bump fails before publish.
        run: |
          uv run --all-groups pytest -m release_tests -vv src/integration_tests/release_tests

      # Only the wheels here — the Docker image is built + pushed by the `build-image` matrix and stitched by
      # `merge-manifest` (native per-arch runners, no QEMU). Building `::` would rebuild the image (and its
      # fat PEX) redundantly on this amd64 runner.
      - name: Build wheels
        run: |
          pants package src/python:beetkeeper-whl src/beetsplug:plugin-whl

      # Each wheel is its own artifact: OIDC trusted publishing mints a project-scoped token, so each PyPI
      # project uploads separately.
      - name: Upload beetkeeper wheel
        if: steps.gate.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wheel-beetkeeper
          path: dist/beetkeeper-*.whl
          if-no-files-found: error

      - name: Upload beetkeeper-plugin wheel
        if: steps.gate.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wheel-beetkeeper-plugin
          path: dist/beetkeeper_plugin-*.whl
          if-no-files-found: error

      - name: Upload Pants log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pants-log
          path: .pants.d/workdir/pants.log

  # Build the image on native per-arch runners (no QEMU): each job `pants package`s a single-arch image into
  # its local daemon, then pushes it under a per-arch tag. Runs on every v* tag (build validation); the push
  # is gated on `is_release`. `merge-manifest` stitches the per-arch tags into the multi-arch manifest list.
  build-image:
    name: Build image (${{ matrix.arch }})
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: image-${{ matrix.arch }}-v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'

      # Plain `pants package` builds for the host arch and loads the image into the local Docker daemon.
      - name: Build image (native ${{ matrix.arch }})
        run: |
          pants package //:beetkeeper-server-image

      - name: Log in to GHCR
        if: needs.release.outputs.is_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push the locally-built image under an arch-suffixed tag; `merge-manifest` combines them.
      - name: Push per-arch tag
        if: needs.release.outputs.is_release == 'true'
        env:
          REF: ghcr.io/zach-overflow/beetkeeper
          VERSION: ${{ needs.release.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          docker tag "${REF}:latest" "${REF}:${VERSION}-${ARCH}"
          docker push "${REF}:${VERSION}-${ARCH}"

  # Stitch the per-arch tags into a single multi-arch manifest list (`:<version>` + `:latest`). Non-Pants:
  # Pants `docker_image` can't push by digest / assemble a manifest list, but `buildx imagetools` can.
  merge-manifest:
    name: Merge multi-arch manifest
    needs: [release, build-image]
    if: needs.release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create + push manifest list
        env:
          REF: ghcr.io/zach-overflow/beetkeeper
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${REF}:${VERSION}" \
            -t "${REF}:latest" \
            "${REF}:${VERSION}-amd64" \
            "${REF}:${VERSION}-arm64"

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    # The `pypi` environment the PyPI trusted publishers are registered against (gates publishing here only).
    environment: pypi
    permissions:
      contents: read
      id-token: write # mint the OIDC token PyPI exchanges for a short-lived, project-scoped API token
    steps:
      - name: Download beetkeeper wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-beetkeeper
          path: dist/beetkeeper

      - name: Download beetkeeper-plugin wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-beetkeeper-plugin
          path: dist/beetkeeper-plugin

      # One publish per project: the OIDC token is project-scoped, so a combined upload would be rejected.
      - name: Publish beetkeeper to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/beetkeeper
          # Don't fail a re-run if one project already uploaded (e.g. the other project's step flaked).
          skip-existing: true

      - name: Publish beetkeeper-plugin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/beetkeeper-plugin
          skip-existing: true

  # Publish the docs site only after the image and wheels have published (same `is_release` gate). Requires
  # repo Pages source = "GitHub Actions".
  docs-build:
    name: Build docs site
    needs: [release, publish-pypi, merge-manifest]
    if: needs.release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so mkdocs-material's git-based features and Pants diffing behave.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Set up uv
        # The `[python] resolver = "uv"` resolve is built with uv, so Pants needs it on PATH.
        uses: astral-sh/setup-uv@v5
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: docs-v0
          named-caches-hash: ${{ hashFiles('3rdparty/tools/tools-lockfile.json') }}
      - name: Build docs site
        run: pants run docs:mkdocs-pex -- build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  docs-deploy:
    name: Deploy docs to GitHub Pages
    needs: docs-build # (transitively requires release + publish-pypi + the release-tag gate)
    runs-on: ubuntu-latest
    # Pages-deploy scopes: granted to THIS job only (the workflow default is `contents: read`).
    permissions:
      pages: write
      id-token: write # deploy-pages mints an OIDC token to prove the artifact's provenance
    # Serialize Pages deployments; let an in-progress deploy finish rather than cancelling it.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
