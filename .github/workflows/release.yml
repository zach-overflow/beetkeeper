name: Release
run-name: Release from ${{ github.ref_name }} by ${{ github.actor }}

# One-click release flow (no draft release needed — versioning is driven by conventional commits):
#   1. Run this workflow (Actions -> Release -> Run workflow, from the default branch). It checks the
#      commits since the latest `vX.Y.Z` tag are conventional and warrant a bump (cog.toml sets
#      `from_latest_tag`/`tag_prefix`), then validates the repo and builds every artifact WITHOUT
#      publishing anything.
#   2. Approve the `release` environment prompt. `cog bump --auto` then computes the next semver from the
#      conventional commits and tags the validated commit `vX.Y.Z` (tag-only: `disable_bump_commit` in
#      cog.toml means nothing is ever pushed to the branch, so `main` protection rules never conflict).
#      The tag is pushed via the `post_bump_hooks` in cog.toml, the GitHub release is uploaded with the
#      cog-generated changelog as its body, and the Publish workflow is dispatched (see the `publish` job
#      below for why it is dispatched rather than `push`-triggered or called as a reusable workflow).
on:
  workflow_dispatch:

permissions:
  contents: read

# Never validate/tag two releases concurrently.
concurrency:
  group: release
  cancel-in-progress: false

# Layer CI-only overrides on top of pants.toml for every Pants invocation below (see pants.ci.toml).
env:
  PANTS_CONFIG_FILES: pants.ci.toml

jobs:
  # cocogitto-action@v4.2.0 pins cog 7.0.0 (the floating v4 tag lags behind and ships an older cog that
  # may not parse this repo's cog.toml).
  check-commits:
    name: Check conventional commits
    runs-on: ubuntu-latest
    steps:
      - name: Require the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "::error::Releases must be run from '${DEFAULT_BRANCH}' (got '${GITHUB_REF_NAME}')."
            exit 1
          fi
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # cog needs the full history and tags to find the latest release tag.
          fetch-depth: 0
      - name: Check commits since the latest tag are conventional
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: check
      - name: Compute the pending release version (dry run)
        run: |
          version="$(cog bump --auto --dry-run)"
          echo "::notice::Validating ${GITHUB_SHA} for release ${version}."

  validate:
    name: Pants validate + build wheels
    needs: check-commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so Pants can diff against base branches (e.g. for `--changed-since`).
          fetch-depth: 0

      - name: Lint GitHub Actions workflows
        # No Pants backend for actionlint, so the shared hook runs it directly (downloads a pinned binary).
        run: |
          bash hooks/actionlint.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        # Pants lint/test goals shell out to `uv run`, so uv must be on PATH. Pinned to match uv.lock.
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          # Bump to invalidate every Pants cache; re-fetch named caches when dependencies change.
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'

      - name: Check BUILD files are up to date
        run: |
          pants update-build-files --check ::

      - name: Static checks and tests
        run: |
          pants lint check test ::

      # Validation-only build (the Publish workflow rebuilds from the tag): proves both wheels build with
      # their `vcs_version`-derived versions. The tag doesn't exist yet, so these carry a dev version.
      - name: Build wheels
        run: |
          pants package src/python:beetkeeper-whl src/beetsplug:plugin-whl

      - name: Upload Pants log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pants-log
          path: .pants.d/workdir/pants.log

  # Validation-only image builds on native per-arch runners (no QEMU, nothing pushed).
  build-image:
    name: Validate image build (${{ matrix.arch }})
    needs: check-commits
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.11.23'
          enable-cache: true
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: image-${{ matrix.arch }}-v0
          named-caches-hash: ${{ hashFiles('uv.lock') }}
          cache-lmdb-store: 'true'
      - name: Build image (native ${{ matrix.arch }})
        run: |
          pants package //:beetkeeper-server-image

  docs-build:
    name: Validate docs build
    needs: check-commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: docs-v0
          named-caches-hash: ${{ hashFiles('3rdparty/tools/tools-lockfile.json') }}
      - name: Build docs site
        run: pants run docs:mkdocs-pex -- build --strict

  # The single manual gate: approving the `release` environment lets `cog bump --auto` compute the version
  # and push the `vX.Y.Z` tag, which lands directly on the validated commit (`disable_bump_commit` — no
  # commit is created, so nothing is pushed to `main`). Configure required reviewers on the `release`
  # environment in repo settings.
  approve-and-tag:
    name: Approve, tag, and publish release
    needs: [check-commits, validate, build-image, docs-build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    outputs:
      version: ${{ steps.github-release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute the version and push the release tag
        id: bump
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: bump
          args: --auto
      - name: Publish the GitHub release
        id: github-release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ steps.bump.outputs.version }}
        run: |
          cog changelog --at "${VERSION_TAG}" > GITHUB_CHANGELOG.md
          gh release create "${VERSION_TAG}" \
            --title "${VERSION_TAG#v}" \
            --notes-file GITHUB_CHANGELOG.md \
            --verify-tag
          echo "version=${VERSION_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "::notice::Tagged $(git rev-parse HEAD) as ${VERSION_TAG} and published the GitHub release."

  # Dispatch (not `workflow_call`) so Publish runs as its own top-level workflow: PyPI trusted publishing
  # rejects reusable workflows, and its registered publisher is pinned to `publish.yml`. `workflow_dispatch`
  # is exempt from GitHub's "GITHUB_TOKEN events don't create workflow runs" recursion guard (a `push` of
  # the tag with GITHUB_TOKEN is not, which is why the tag itself can't trigger Publish here).
  publish:
    name: Dispatch publish workflow
    needs: approve-and-tag
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger publish.yml for v${{ needs.approve-and-tag.outputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.approve-and-tag.outputs.version }}
        run: |
          gh workflow run publish.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "v${VERSION}" \
            -f version="${VERSION}"
