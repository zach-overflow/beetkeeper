[GLOBAL]
backend_packages = [
  "pants.backend.build_files.fmt.ruff",
  "pants.backend.docker",
  "pants.backend.docker.lint.hadolint",
  "pants.backend.experimental.adhoc",
  "pants.backend.experimental.python.lint.ruff.check",
  "pants.backend.experimental.python.lint.ruff.format",
  "pants.backend.experimental.tools.yamllint",
  "pants.backend.experimental.visibility",
  "pants.backend.python",
  "pants.backend.python.lint.bandit",
  "pants.backend.python.typecheck.mypy",
  "pants.backend.shell",
  "pants.backend.shell.lint.shellcheck",
  "pants.backend.shell.lint.shfmt",
  "pants.backend.tools.taplo",
]
pants_version = "2.32.0"
build_patterns = ["BUILD", "BUILD.*"]
build_file_prelude_globs = ["build_scripts/pants_macros.py"]
colors = true
pants_ignore = [
  ".*/",
  "**/.venv/",
  "/dist/",
  "/site/",
  "__pycache__",
  "!.semgrep/",
  "!.github/",
]

[changed]
dependents = "transitive"

[source]
# Longest-matching prefix wins, so files under the two distribution roots resolve to those, not `src`.
root_patterns = ["src", "src/beetsplug", "src/python"]

[docker]
use_buildx = true
# Puts Docker Desktop's `credsStore = "desktop"` helper on the build process PATH; `pants.ci.toml` clears
# this since CI runners lack it (CI must run with `PANTS_CONFIG_FILES=pants.ci.toml`).
tools = ["docker-credential-desktop"]

[docker.registries.ghcr]
address = "ghcr.io"

[tailor]
build_file_name = "BUILD"

[taplo]
glob_pattern = ["**/*.toml", "!.taplo.toml", "!taplo.toml"]

[test]
extra_env_vars = ["PANTS=true"]

[cli.alias]
--all-changed = "--changed-since=HEAD --changed-dependents=transitive"

[python-bootstrap]
search_path = ["<PYENV>", "<ASDF>", "<PATH>"]

# We don't set `[pytest].skip` — the `test` goal never reads it. Pants' own pytest is disabled via
# `skip_tests=True` on the targets; we run pytest through `//:pytest` to use plugins without a separate
# resolve: https://www.pantsbuild.org/stable/reference/subsystems/pytest#requirements
[python]
# resolver = "uv"
resolver = "pex"
enable_resolves = true
default_resolve = "beetkeeper-resolve"
interpreter_constraints = [">=3.14,<3.15"]
interpreter_versions_universe = ["3.14"]
pip_version = "latest"
separate_lockfile_metadata_file = true

[python.resolves]
"beetkeeper-resolve" = "3rdparty/python/beetkeeper-lockfile.json"
# Separate resolve so `beets` has one owner per resolve, keeping import inference unambiguous.
"beetsplug-resolve" = "3rdparty/python/beetsplug-lockfile.json"
"tools-resolve" = "3rdparty/tools/tools-lockfile.json"

[bandit]
args = ["--quiet", "--severity-level=medium", "--confidence-level=medium"]
config = "pyproject.toml"
install_from_resolve = "tools-resolve"
requirements = ["bandit"]

[mypy]
config = "pyproject.toml"
install_from_resolve = "tools-resolve"
requirements = [
  "mypy",
  "mypy-extensions",
  "pydantic",        # for the `pydantic.mypy` plugin
  "pytest",          # so type checking can proceed on test files
]

[pytest]
# args = [
# 	# "-v",
#   "-p",
#   "no:cacheprovider",
#   "--disable-socket",
#   "--allow-hosts=testclient",
#   "--durations=5",
# ]
config = "pyproject.toml"
install_from_resolve = "tools-resolve"
# Must include every plugin whose options we pass in `args`/`addopts` (e.g. `pytest-socket`), or pex's
# argparse rejects those options: https://www.pantsbuild.org/stable/reference/subsystems/pytest#requirements
requirements = [
  "fastapi[standard]",
  "pytest",
  "pytest-socket",
  "pytest-xdist",
  "ruamel-yaml",
  "tomlkit",
]
xdist_enabled = false

[update-build-files]
fmt = true
formatter = "ruff"

[yamllint]
config_file_name = ".yamllint.yaml"
