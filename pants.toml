[GLOBAL]
backend_packages = [
  "pants.backend.build_files.fmt.ruff",
  "pants.backend.docker",
  "pants.backend.docker.lint.hadolint",
  "pants.backend.experimental.adhoc",
  "pants.backend.experimental.python.lint.ruff.check",
  "pants.backend.experimental.python.lint.ruff.format",
  "pants.backend.experimental.tools.yamllint",
  "pants.backend.experimental.visibility",
  "pants.backend.python",
  "pants.backend.python.lint.bandit",
  "pants.backend.python.typecheck.mypy",
  "pants.backend.shell",
  "pants.backend.shell.lint.shellcheck",
  "pants.backend.shell.lint.shfmt",
  "pants.backend.tools.taplo",
]
pants_version = "2.32.0"
build_patterns = ["BUILD", "BUILD.*"]
build_file_prelude_globs = ["build_scripts/pants_macros.py"]
colors = true
pants_ignore = [
  ".*/",
  "**/.venv/",
  "/dist/",
  "/site/",
  "__pycache__",
  "!.semgrep/",
  "!.github/",
]

[changed]
dependents = "transitive"

[source]
# `src/python` + `src/beetsplug` are the two distribution roots. `src` is a broader root for non-distribution
# Python under `src/` (e.g. `src/release_tests`); Pants uses the longest-matching prefix, so files under the
# two distribution roots still resolve to those, leaving their wheel module layouts unchanged.
root_patterns = ["src", "src/beetsplug", "src/python"]

[docker]
use_buildx = true

[docker.registries.ghcr]
# The app image (`//:beetkeeper-server-image`) is named `ghcr.io/zach-overflow/beetkeeper` everywhere:
# `pants package` builds + loads it under that name locally, and `pants publish` pushes it here.
address = "ghcr.io"

[tailor]
build_file_name = "BUILD"

[taplo]
glob_pattern = ["**/*.toml", "!.taplo.toml", "!taplo.toml"]

[test]
extra_env_vars = ["PANTS=true"]

[cli.alias]
--all-changed = "--changed-since=HEAD --changed-dependents=transitive"

[python-bootstrap]
search_path = ["<PYENV>", "<ASDF>", "<PATH>"]

# NOTE: we deliberately do NOT set `[pytest].skip` here — it is not consulted by the `test` goal
# (it's a bare SkipOption that no pytest rule reads), so it does nothing. Pants' own pytest is
# disabled instead via `skip_tests=True` on the `python_tests` targets (see src/python/tests/BUILD).
# We run pytest ourselves through the `//:pytest` `test_shell_command` so we can use pytest plugins
# without managing a separate resolve: https://www.pantsbuild.org/stable/reference/subsystems/pytest#requirements
# https://www.pantsbuild.org/stable/reference/subsystems/python
[python]
resolver = "uv"                            # TBD on when we can use pantsbuild + uv resolver for building pex_binary targets
enable_resolves = true
default_resolve = "beetkeeper-resolve"
interpreter_constraints = [">=3.14,<3.15"]
interpreter_versions_universe = ["3.14"]
pip_version = "latest"
separate_lockfile_metadata_file = true

# https://www.pantsbuild.org/stable/reference/subsystems/python#resolves
[python.resolves]
"beetkeeper-resolve" = "3rdparty/python/beetkeeper-lockfile.json"
# The `beetkeeper-plugin` distribution (`src/beetsplug`) has its own resolve so its `beets` requirement is a
# SEPARATE owner from the app's `src/python:app-requirements#beets`. With one `beets` owner per resolve,
# Pants' import inference is unambiguous in both — no manual `#beets` dependency workarounds needed.
"beetsplug-resolve" = "3rdparty/python/beetsplug-lockfile.json"
"tools-resolve" = "3rdparty/tools/tools-lockfile.json"

[bandit]
# https://bandit.readthedocs.io/en/latest/man/bandit.html#options
args = [
  "--quiet",                   # Only show output on errors.
  "--severity-level=medium",   # report only issues of 'medium' severity level or higher
  "--confidence-level=medium", # report only issues of 'medium' confidence level or higher
]
config = "pyproject.toml"
install_from_resolve = "tools-resolve"
requirements = ["bandit"]

[mypy]
config = "pyproject.toml"
install_from_resolve = "tools-resolve"
# mypy is using only a subset of the shared `tools-resolve` requiremnts
# https://www.pantsbuild.org/stable/reference/subsystems/mypy#requirements
requirements = [
  "mypy",
  "mypy-extensions",
  # Required for `pydantic.mypy` plugin. See comment in `3rdparty/tools/tools-resolve-requirements.txt`
  "pydantic",
  # Need pytest so type checking can proceed on test files.
  "pytest",
]

[pytest]
# args = [
# 	# "-v",
#   "-p",
#   "no:cacheprovider",
#   "--disable-socket",
#   "--allow-hosts=testclient",
#   "--durations=5",
# ]
config = "pyproject.toml"
install_from_resolve = "tools-resolve"
# pytest installs a SUBSET of the shared `tools-resolve` lockfile. The subset MUST include `pytest` itself
# AND every plugin whose options we pass in `args`/`addopts` — notably `pytest-socket` (`--disable-socket`,
# `--allow-hosts`); otherwise pytest never registers those options and pex's argparse rejects them.
# https://www.pantsbuild.org/stable/reference/subsystems/pytest#requirements
requirements = [
  # `[standard]` adds the test/tool extras (uvicorn, httpx, ...); the bare version is kept equal to the
  # app's `fastapi` pin by `src/python/tests/meta_tests/test_resolve_version_consistency.py`.
  "fastapi[standard]",
  "pytest",
  "pytest-socket",
  "pytest-xdist",
  "ruamel-yaml",
  "tomlkit",
]
# # https://www.pantsbuild.org/stable/reference/subsystems/pytest#xdist_enabled
xdist_enabled = false

[update-build-files]
fmt = true
formatter = "ruff"

# https://www.pantsbuild.org/stable/reference/subsystems/yamllint
[yamllint]
config_file_name = ".yamllint.yaml"
